# Front-jump recovery configuration.
entanglement_recovery:
  ros__parameters:
    # Network interface for the Unitree SDK2 DDS transport.
    # On the Go2 use "eth0" (192.168.123.x internal ethernet where sport mode runs).
    # Do NOT use wlan0 (external WiFi) or a VPN interface (no multicast).
    network_interface: "eth0"

    # Topic published by the detector node.
    entanglement_topic: "/entanglement_state"

    # Ignore alarms whose maximum per-leg intensity is below this value.
    # 0.0 = trigger on any debounced alarm (the detector's own threshold/debounce is the filter).
    min_intensity: 0.0

    # Consecutive qualifying alarm messages required before committing to the jump.
    # The detector output is already debounced, so this is a small extra guard against a
    # single stray frame triggering a high-consequence jump.
    confirm_count: 3
