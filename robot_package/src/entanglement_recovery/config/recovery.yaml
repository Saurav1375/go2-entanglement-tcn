# Entanglement recovery configuration.
# On an alarm the robot runs one sequence: stop -> move back -> stop -> front jump -> stop.
entanglement_recovery:
  ros__parameters:
    # Network interface for the Unitree SDK2 DDS transport.
    # On the Go2 use "eth0" (192.168.123.x internal ethernet where sport mode runs).
    # Do NOT use wlan0 (external WiFi) or a VPN interface (no multicast).
    network_interface: "eth0"

    # Topic published by the detector node.
    entanglement_topic: "/entanglement_state"

    # Ignore alarms whose maximum per-leg intensity is below this value.
    # 0.0 = trigger on any debounced alarm (the detector's own threshold/debounce is the filter).
    min_intensity: 0.0

    # Consecutive qualifying alarm messages required before acting.
    # 1 = act on the FIRST detection (no added latency); the detector output is already debounced,
    # so a single message is a confirmed detection. Raise only if you want extra confirmation.
    confirm_count: 1

    # "Move back" step of the sequence.
    back_speed: 0.3        # backward speed, m/s (magnitude)
    back_duration: 0.5     # seconds to move backward before the jump
