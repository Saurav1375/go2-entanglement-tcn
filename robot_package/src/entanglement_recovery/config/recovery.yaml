# Recovery framework configuration. Every timer/threshold/topic is here — no magic numbers
# in code. See docs/RECOVERY_CONFIG.md for the annotated reference.
entanglement_recovery:
  ros__parameters:
    # ---- SAFETY GATE ----
    # false (default) = DRY-RUN: the state machine runs and logs the commands it WOULD send,
    # but sends NOTHING to the robot. Set true ONLY after dry-run validation on hardware.
    enable_actuation: false
    auto_arm: true                  # begin MONITORING at startup
    control_rate_hz: 50.0           # FSM tick rate

    # ---- gating / confirmation ----
    confirmation_time_s: 0.5        # sustained detection required before acting (rejects noise)
    confidence_min: 0.0             # ignore detections below this calibrated confidence

    # ---- command execution ----
    command_timeout_s: 1.0          # wait for /api/sport/response before retrying
    retry_limit: 2                  # retries per command before FAULT
    stop_settle_s: 0.5              # settle after StopMove ack
    recovery_settle_s: 2.0          # settle after BalanceStand/RecoveryStand ack

    # ---- verification / resume ----
    verification_duration_s: 1.5    # detector must read clear this long to confirm success
    verify_timeout_s: 4.0           # still entangled this long -> re-attempt recovery
    resume_delay_s: 1.0             # hold a stable stance before handing control back
    cooldown_s: 5.0                 # ignore new triggers after a cycle (anti-thrash)

    # ---- robustness / safety ----
    robot_state_timeout_s: 0.5      # /sportmodestate older than this is "stale"
    max_state_time_s: 10.0          # per-active-state watchdog -> FAULT
    auto_reset_s: 0.0               # 0 = FAULT requires manual /recovery_reset; >0 auto-clears
    escalate_to_recovery_stand: true # use RecoveryStand(1006) if a FALL is detected
    use_damp_on_fault: true         # issue Damp(1001) on FAULT/ESTOP (soft e-stop)
    tip_roll_deg: 50.0              # |roll| beyond this => FALLEN (escalate)
    tip_pitch_deg: 50.0
    min_soc_pct: 10.0               # gate RecoveryStand on battery %

    # ---- topics ----
    entanglement_topic: "/entanglement_state"
    status_topic: "/recovery_status"
    sport_request_topic: "/api/sport/request"
    sport_response_topic: "/api/sport/response"
    sportmode_topic: "/sportmodestate"
    lowstate_topic: "/lowstate"
    estop_topic: "/recovery_estop"
    reset_topic: "/recovery_reset"
