<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="470" viewBox="0 0 1040 470" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="gauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3C7A3C"/><stop offset="0.5" stop-color="#E0B02A"/><stop offset="1" stop-color="#C0392B"/>
    </linearGradient>
    <style>
      .h{font-size:23px;font-weight:700;fill:#1F2A37}
      .lab{font-size:15px;font-weight:700;fill:#33414F}
      .big{font-size:22px;font-weight:700;fill:#1F2A37}
      .sm{font-size:13.5px;fill:#5A6B82}
      .leg{font-size:15px;font-weight:700;fill:#33414F}
    </style>
  </defs>
  <rect width="1040" height="470" fill="#ffffff"/>
  <text x="520" y="42" text-anchor="middle" class="h">What the system reports at every instant</text>

  <!-- LEFT: robot top view -->
  <text x="250" y="86" text-anchor="middle" class="sm">the robot, seen from above</text>
  <text x="250" y="108" text-anchor="middle" class="sm">▲ front</text>
  <!-- body -->
  <rect x="180" y="130" width="140" height="230" rx="26" fill="#ECEFF3" stroke="#37474F" stroke-width="2.5"/>
  <!-- legs: FL top-left, FR top-right, RL bottom-left, RR bottom-right -->
  <!-- FL -->
  <rect x="128" y="150" width="46" height="30" rx="8" fill="#E6F2E6" stroke="#3C7A3C" stroke-width="2"/>
  <text x="151" y="142" text-anchor="middle" class="leg">FL</text>
  <!-- FR -->
  <rect x="326" y="150" width="46" height="30" rx="8" fill="#E6F2E6" stroke="#3C7A3C" stroke-width="2"/>
  <text x="349" y="142" text-anchor="middle" class="leg">FR</text>
  <!-- RL -->
  <rect x="128" y="310" width="46" height="30" rx="8" fill="#E6F2E6" stroke="#3C7A3C" stroke-width="2"/>
  <text x="151" y="362" text-anchor="middle" class="leg">RL</text>
  <!-- RR (caught) -->
  <rect x="326" y="310" width="46" height="30" rx="8" fill="#F6D4CE" stroke="#C0392B" stroke-width="3"/>
  <text x="349" y="362" text-anchor="middle" class="leg" fill="#C0392B">RR</text>
  <!-- wire squiggle on RR -->
  <path d="M300,300 q14,-16 28,0 q14,16 28,0 q14,-16 28,0" fill="none" stroke="#C0392B" stroke-width="2.4"/>
  <text x="349" y="300" text-anchor="middle" class="sm" fill="#C0392B" font-weight="700">caught!</text>

  <!-- RIGHT: readouts -->
  <line x1="430" y1="120" x2="430" y2="380" stroke="#DDE3EA" stroke-width="1.5"/>

  <text x="470" y="150" class="lab">WHICH leg is caught?</text>
  <rect x="470" y="164" width="300" height="52" rx="10" fill="#FBEEDD" stroke="#B5701A" stroke-width="2"/>
  <text x="490" y="197" class="big">Rear-Right&#160;&#160;(RR)</text>

  <text x="470" y="262" class="lab">HOW badly? — severity 0–100%</text>
  <!-- gauge track -->
  <rect x="470" y="278" width="470" height="26" rx="13" fill="url(#gauge)" opacity="0.9"/>
  <!-- marker at 80% -->
  <g transform="translate(846,278)">
    <polygon points="0,-10 10,-24 -10,-24" fill="#1F2A37"/>
    <rect x="-2.5" y="-2" width="5" height="30" fill="#1F2A37"/>
  </g>
  <text x="846" y="336" text-anchor="middle" class="big">80%</text>
  <text x="846" y="356" text-anchor="middle" class="sm">strong snag</text>
  <text x="470" y="322" class="sm">gentle</text>
  <text x="640" y="322" class="sm">moderate</text>
  <text x="470" y="392" class="sm">Severity tells the recovery how hard (and how carefully) to act.</text>
</svg>
